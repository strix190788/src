
# Конфигурация SLAM Toolbox для нашего робота
# Оптимизировано для LDROBOT D500 и симуляции

slam_toolbox:
  ros__parameters:
    # ═══════════════════════════════════════════════════
    # ОСНОВНЫЕ ПАРАМЕТРЫ
    # ═══════════════════════════════════════════════════
    
    # Режим работы: mapping, localization, lifelong
    mode: mapping
    
    # Частота обработки (Hz)
    # Не выше частоты лидара (10 Hz для D500)
    transform_publish_period: 0.02  # 50 Hz для TF
    map_update_interval: 0.5        # Обновление карты каждые 0.5 сек
    
    # Имена фреймов
    odom_frame: odom
    map_frame: map
    base_frame: base_link
    scan_topic: /scan
    
    # ═══════════════════════════════════════════════════
    # ПАРАМЕТРЫ СКАНЕРА (LDROBOT D500)
    # ═══════════════════════════════════════════════════
    
    # Максимальная дальность лидара
    max_laser_range: 12.0  # D500: до 12 метров
    
    # Минимальная дальность (отсечь шум вблизи)
    minimum_travel_distance: 0.3  # Минимум 30 см между сканами
    minimum_travel_heading: 0.3   # Минимум 0.3 рад (~17°) поворота
    
    # ═══════════════════════════════════════════════════
    # ПАРАМЕТРЫ SCAN MATCHING
    # ═══════════════════════════════════════════════════
    
    # Размер окна поиска для сопоставления сканов
    scan_buffer_size: 10
    scan_buffer_maximum_scan_distance: 10.0
    
    # Корреляционное сопоставление
    link_match_minimum_response_fine: 0.1
    link_scan_maximum_distance: 1.5
    
    # Параметры оптимизации
    loop_search_maximum_distance: 3.0
    do_loop_closing: true
    loop_match_minimum_chain_size: 10
    loop_match_maximum_variance_coarse: 3.0
    loop_match_minimum_response_coarse: 0.35
    loop_match_minimum_response_fine: 0.45
    
    # ═══════════════════════════════════════════════════
    # ПАРАМЕТРЫ КАРТЫ
    # ═══════════════════════════════════════════════════
    
    # Разрешение карты (метров на ячейку)
    resolution: 0.05  # 5 см — хороший баланс точности и памяти
    
    # Порог занятости для ячеек
    # Ячейка считается занятой, если вероятность > 0.65
    # Ячейка считается свободной, если вероятность < 0.35
    
    # ═══════════════════════════════════════════════════
    # ПАРАМЕТРЫ TF
    # ═══════════════════════════════════════════════════
    
    # Публиковать трансформацию map → odom
    use_map_saver: true
    
    # Тайм-аут для TF (секунды)
    transform_timeout: 0.2
    tf_buffer_duration: 30.0
    
    # ═══════════════════════════════════════════════════
    # РЕЖИМ СИМУЛЯЦИИ
    # ═══════════════════════════════════════════════════
    
    # Использовать время симуляции
    use_sim_time: false
    
    # Дебаг
    debug_logging: false
